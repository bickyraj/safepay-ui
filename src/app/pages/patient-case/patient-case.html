<div class="bg-gray-100">
    <!-- Header -->
  <div class="flex mb-5 place-content-between">
    <div class="">
      <h1 class="text-2xl font-bold text-gray-800 capitalize">Patient Cases</h1>
      <p class="text-gray-500 mt-1">
        Select a module to manage hospital resources.
      </p>
    </div>
    <button
      [routerLink]="'add'"
      class="inline-flex h-10 cursor-pointer items-center gap-2 rounded-sm bg-blue-600 px-4 py-2.5 text-sm font-medium text-white shadow-sm transition-all duration-200 hover:bg-blue-700 hover:shadow-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">

      <svg xmlns="http://www.w3.org/2000/svg"
           class="h-5 w-5"
           fill="none"
           viewBox="0 0 24 24"
           stroke="currentColor"
           stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 4v16m8-8H4"/>
      </svg>

      Add New Patient Case
    </button>
  </div>
  <app-mx-table
    [columns]="columns"
    [dataList]="dataList()"
    [paginationDetails]="paginationDetails()"
    (pageChange)="loadPage($event)"
  />
</div>
