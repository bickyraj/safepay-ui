<div class="max-w-3xl bg-white p-6 rounded shadow space-y-6">
  <form [formGroup]="patientCaseForm">
    <!-- Patient Details -->
    <div class="space-y-4 block mb-5">
      <h2 class="text-xl font-semibold">Patient Details</h2>

      <input
        [formControlName]="'patientId'"
        type="text"
        placeholder="Patient ID"
        class="w-full border-[1px] border-gray-300 rounded p-3 focus:ring-2 focus:ring-blue-500"
      />

      <input
        [formControlName]="'name'"
        type="text"
        placeholder="Name"
        class="w-full border-[1px] border-gray-300 rounded p-3 focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <!-- File Upload Section -->
    <div class="bg-gray-50 p-5 rounded border-gray-100 space-y-4">

      <div class="flex items-center justify-between">
        <h2 class="text-xl font-semibold">Files</h2>

        <label class="cursor-pointer bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
          Add Files
          <input type="file" multiple class="hidden" (change)="onFilesSelected($event)" />
        </label>
      </div>

      <!-- File Cards -->
      <div class="space-y-3">

        @for (file of caseFiles(); track file.id) {
          <!-- File Card 1 -->
          <div class="flex items-center justify-between bg-white p-4 rounded shadow">

            <div>
              <p class="font-medium">{{ file.name }}</p>
              <p class="text-sm text-gray-500">{{ file.size / 1024 | number:'1.0-0' }} KB</p>
            </div>

            <div class="w-1/2">
              <div class="w-full bg-gray-200 rounded-full h-2">
                <div class="bg-green-500 h-2 rounded-full" [style.width.%]="file.progress()"></div>
              </div>
              <p class="text-xs text-right text-gray-500 mt-1">{{ file.progress() }}%</p>
            </div>

          </div>
        }
      </div>
    </div>

    <!-- Submit Button -->
    <button (click)="onSubmit()" class="w-full mt-5 bg-green-600 text-white py-3 rounded hover:bg-green-700 transition">
    Submit Patient Case
  </button>
  </form>
</div>
