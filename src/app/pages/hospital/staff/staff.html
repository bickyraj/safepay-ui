<div class="mb-4 flex justify-end">
  <button
    (click)="openAddStaffModal()"
    class="inline-flex cursor-pointer items-center gap-2 rounded-sm bg-blue-600 px-4 py-2.5 text-sm font-medium text-white shadow-sm transition-all duration-200 hover:bg-blue-700 hover:shadow-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">

    <svg xmlns="http://www.w3.org/2000/svg"
         class="h-5 w-5"
         fill="none"
         viewBox="0 0 24 24"
         stroke="currentColor"
         stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 4v16m8-8H4"/>
    </svg>

    Add Staff
  </button>
</div>
<app-mx-table
  [columns]="columns"
  [dataList]="dataList()"
  [paginationDetails]="paginationDetails()"
  (pageChange)="loadPage($event)"
/>

<app-modal title="Add Staff"  [(isOpen)]="openModal">
  <form [formGroup]="staffForm" class="space-y-6">

    <!-- STAFF SEARCH + MULTI SELECT -->
    <div>
      <label class="text-sm font-medium">Select Staff</label>

      <input
        type="text"
        placeholder="Search staff..."
        class="mt-2 w-full border rounded-sm px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500"
        [(ngModel)]="searchText"
        [ngModelOptions]="{standalone: true}"
        (input)="searchText()"
      />

      <!-- Dropdown -->
      <div class="mt-2 max-h-40 overflow-y-auto border rounded-sm">

        @for (staff of filteredStaff(); track staff.id) {
          <div
            (click)="addStaff(staff)"
            class="p-2 hover:bg-gray-100 cursor-pointer flex justify-between">

            <span>{{ staff.firstName }}</span>
            <span class="text-blue-600 text-sm">Add</span>
          </div>
        }

      </div>

      <!-- Selected Tags -->
      <div class="mt-3 flex flex-wrap gap-2">

        @for (s of selectedStaff; track s.id) {
          <span
            class="bg-blue-100 text-blue-700 px-3 py-1 rounded-sm text-sm flex items-center gap-2">

              {{ s.firstName }}

            <button class="cursor-pointer" type="button" (click)="removeStaff(s)">
                &times;
              </button>
            </span>
        }

      </div>
    </div>

    <!-- ROLE -->
    <div>
      <label class="text-sm font-medium">Assign Role</label>

      <select formControlName="role"
              class="mt-2 w-full border rounded-sm px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500">

        <option value="">Select Role</option>
        <option value="ADMIN">Hospital Admin</option>
        <option value="DOCTOR">Doctor</option>
        <option value="NURSE">Nurse</option>
        <option value="RECEPTIONIST">Receptionist</option>
        <option value="PHARMACIST">Pharmacist</option>

      </select>
    </div>

  </form>

  <div modal-footer class="flex gap-3">
    <button (click)="close()"
            class="px-4 py-2 rounded-sm border hover:bg-gray-100">
      Cancel
    </button>

    <button (click)="submit()"
            class="px-4 py-2 rounded-sm bg-blue-600 text-white hover:bg-blue-700">
      Add Staff
    </button>
  </div>
</app-modal>
