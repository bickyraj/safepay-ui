<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudFlow - Streamline Your Workflow</title>
</head>
<body class="bg-gray-light text-gray-800">
<!-- Navigation -->
<nav #menu class="fixed top-0 w-full z-50 glass-effect shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center py-4">
      <div class="flex items-center gap-2">
        <img alt="Logo"
             ngSrc="assets/mx-logo.png"
             width="100"
             height="400"
             class="h-10 w-auto" />
        <span class="text-xl font-bold pt-1" [ngClass]="menuTextColor">MX SERVICE</span>
      </div>
      <div id="header-menu" class="hidden md:flex space-x-8" [ngClass]="menuTextColor">
        <a href="" class="transition-colors">Home</a>
        <a href="#features" class="transition-colors">Features</a>
        <a href="#pricing" class="transition-colors">Pricing</a>
        <a href="#about" class="transition-colors">About</a>
        <a href="#contact" class="transition-colors">Contact</a>
      </div>
      <div class="flex space-x-4">
        <button (click)="login()" class="cursor-pointer text-white hover:text-sky-200 transition-colors">Sign In</button>
        <button routerLink="/get-started" class="cursor-pointer bg-white text-sky-600 px-4 py-2 rounded-lg font-medium hover:bg-sky-50 transition-colors">Get Started</button>
      </div>
    </div>
  </div>
</nav>

<div class="h-screen">
  <router-outlet></router-outlet>
</div>

<!-- Footer -->
<footer class="bg-gray-900 text-white py-12">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="grid md:grid-cols-4 gap-8">
      <div>
        <div class="flex items-center mb-4">
          <div class="w-8 h-8 bg-gradient-to-r from-sky-500 to-blue-500 rounded-lg mr-3"></div>
          <span class="text-xl font-bold">MX SERVICE</span>
        </div>
        <p class="text-gray-400">Streamline your workflow with powerful automation tools.</p>
      </div>
      <div>
        <h4 class="font-semibold mb-4">Product</h4>
        <ul class="space-y-2 text-gray-400">
          <li><a href="#" class="hover:text-white transition-colors">Features</a></li>
          <li><a href="#" class="hover:text-white transition-colors">Pricing</a></li>
          <li><a href="#" class="hover:text-white transition-colors">Integrations</a></li>
        </ul>
      </div>
      <div>
        <h4 class="font-semibold mb-4">Company</h4>
        <ul class="space-y-2 text-gray-400">
          <li><a href="#" class="hover:text-white transition-colors">About</a></li>
          <li><a href="#" class="hover:text-white transition-colors">Blog</a></li>
          <li><a href="#" class="hover:text-white transition-colors">Careers</a></li>
        </ul>
      </div>
      <div>
        <h4 class="font-semibold mb-4">Support</h4>
        <ul class="space-y-2 text-gray-400">
          <li><a href="#" class="hover:text-white transition-colors">Help Center</a></li>
          <li><a href="#" class="hover:text-white transition-colors">Contact</a></li>
          <li><a href="#" class="hover:text-white transition-colors">Status</a></li>
        </ul>
      </div>
    </div>
    <div class="border-t border-gray-800 mt-8 pt-8 text-center text-gray-400">
      <p>&copy; 2025 CloudFlow. All rights reserved.</p>
    </div>
  </div>
</footer>
</body>
</html>
