<li class="py-1 px-2">
  <a
    class="w-full transition-all duration-200 hover:bg-sky-100 font-medium text-sky-900 capitalize flex gap-2 items-center px-3 py-3 rounded-lg"
    [ngClass]="{
      'justify-center flex-col': isCollapsed()
    }"
    routerLink="dashboard"
    routerLinkActive="bg-sky-50"
  >
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 17.25v1.007a3 3 0 0 1-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0 1 15 18.257V17.25m6-12V15a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 15V5.25m18 0A2.25 2.25 0 0 0 18.75 3H5.25A2.25 2.25 0 0 0 3 5.25m18 0V12a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 12V5.25" />
    </svg>
    <span [ngClass]="{
      'text-sm': !isCollapsed(),
      'text-xs': isCollapsed()
    }">Dashboard</span>
  </a>
</li>

<li class="py-1 px-2" *kaHasRoles="['superadmin']; checkRealm:true">

    }"
  >
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6a7.5 7.5 0 1 0 7.5 7.5h-7.5V6Z" />
      <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 10.5H21A7.5 7.5 0 0 0 13.5 3v7.5Z" />
    </svg>

    <span [ngClass]="{
      'text-sm': !isCollapsed(),
      'text-xs': isCollapsed()
    }">Hospitals</span>
  </a>
</li>
