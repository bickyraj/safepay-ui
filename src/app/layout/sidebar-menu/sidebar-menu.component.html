<li class="py-1 px-2">
  <a
    class="w-full transition-all duration-200 hover:bg-sky-100 font-medium text-sky-900 capitalize flex gap-2 items-center px-3 py-3 rounded-lg"
    [ngClass]="{
      'justify-center flex-col': isCollapsed()

    routerLinkActive="bg-sky-50"
  >
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">

    </svg>
    <span [ngClass]="{
      'text-sm': !isCollapsed(),
      'text-xs': isCollapsed()
    }">Dashboard</span>
  </a>
</li>
