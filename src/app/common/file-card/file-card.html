<div
  class="group rounded-xl border border-gray-200 bg-white p-4 shadow-sm transition-all duration-200 hover:-translate-y-1 hover:shadow-lg hover:border-blue-200"
>

  <!-- Top Row: Icon + Name + Size -->
  <div class="flex items-start gap-3">

    <!-- Icon -->
    <div class="flex items-center justify-center h-10 w-10 rounded-lg bg-blue-50 flex-shrink-0">
      <svg xmlns="http://www.w3.org/2000/svg"
           class="h-6 w-6 text-blue-600"
           fill="none"
           viewBox="0 0 24 24"
           stroke="currentColor"
           stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M7 3h7l5 5v13a1 1 0 01-1 1H7a2 2 0 01-2-2V5a2 2 0 012-2z"/>
      </svg>
    </div>

    <!-- Name + Size -->
    <div class="min-w-0 flex-1">
      <p class="truncate text-sm font-semibold text-gray-800">
        {{ file.name }}
      </p>

      <p class="text-xs text-gray-500 mt-0.5">
        {{ file.size / 1024 | number:'1.0-0' }} KB
      </p>
    </div>

  </div>

  <!-- Bottom: Progress OR Action -->
  <div class="mt-4">

    @if (showRemoveBtn) {
      <div>
        <div class="w-full bg-gray-200 rounded-full h-1.5 overflow-hidden">
          <div
            class="bg-green-500 h-1.5 rounded-full transition-all duration-300"
            [style.width.%]="file.progress()"
          ></div>
        </div>

        <p class="text-xs text-right text-gray-500 mt-1">
          {{ file.progress() }}%
        </p>
      </div>

    } @else {
      <button
        type="button"
        (click)="remove()"
        class="w-full text-red-600 font-medium bg-red-50 px-3 py-1.5 text-xs rounded-lg hover:bg-red-100 transition"
      >
        Remove
      </button>
    }

  </div>

</div>
